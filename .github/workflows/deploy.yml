name: Deploy to production

# Auto-deploy: every push to `main` (or manual run) SSHes into the prod
# server and runs deploy/remote-deploy.sh. Mirrors the manual recipe:
#   push main → ssh root@<host> → git pull → docker compose up -d --build
on:
  push:
    branches: [main]
  workflow_dispatch:

# Never let two deploys run at once; queue them instead of cancelling.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy over SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new \
            "$SSH_USER@$SSH_HOST" 'bash -s' < deploy/remote-deploy.sh
