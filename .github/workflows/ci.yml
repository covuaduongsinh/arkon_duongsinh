name: CI

# Quality gate. Runs on every PR and on pushes to main. The production deploy
# workflow is chained off a SUCCESSFUL run of this workflow on main (see
# deploy.yml `workflow_run`), so a red CI blocks deploys.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  # ── Backend: lint + tests against a real pgvector Postgres ──────────────
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: arkon
          POSTGRES_PASSWORD: arkon_secret
          POSTGRES_DB: arkon_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U arkon"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://arkon:arkon_secret@localhost:5432/arkon_test
      SECRET_KEY: ci-test-secret
      MCP_TOKEN_PEPPER: ci-test-pepper
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check app tests
      - name: Run tests
        run: pytest

  # ── Migration gate: a clean DB must reach head without error ────────────
  # Directly guards the "bad migration → whole site 502" failure mode: the
  # migrator container runs `alembic upgrade head` on boot, so a broken chain
  # takes the whole site down. Catch it here instead.
  migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: arkon
          POSTGRES_PASSWORD: arkon_secret
          POSTGRES_DB: arkon
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U arkon"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://arkon:arkon_secret@localhost:5432/arkon
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Alembic upgrade head (fresh DB)
        run: alembic upgrade head

  # ── Frontend: lint + production build ───────────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Unit tests (vitest)
        run: npm run test
      - name: Build
        run: npm run build
      # NOTE: `npm run lint` is intentionally NOT a hard gate yet — the frontend
      # currently has a large backlog of pre-existing eslint errors (tracked for
      # Phase 3 cleanup). `next build` already type-checks and compiles the whole
      # app, which is the meaningful breakage gate.
